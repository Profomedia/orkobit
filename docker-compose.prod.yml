services:

  backend:
    image: ghcr.io/profomedia/orkobit-backend:latest

    container_name: orko_backend

    restart: unless-stopped

    # env_file:
    #   - /opt/ororklabs/orkobit/.env

    depends_on:
      - db
      - redis

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/login/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ghcr.io/profomedia/orkobit-frontend:latest

    container_name: orko_frontend

    restart: unless-stopped

    depends_on:
      - backend

    expose:
      - "80"

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  worker:
    image: ghcr.io/profomedia/orkobit-backend:latest

    container_name: orko_worker

    restart: unless-stopped

    depends_on:
      - db
      - redis

    command: >
      celery -A config worker -l info

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:16.4

    container_name: orko_db

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5

    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  redis:
    image: redis:7.4

    container_name: orko_redis

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  caddy:
    image: caddy:2.8

    container_name: orko_caddy

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

    depends_on:
      - frontend
      - backend

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest

    container_name: orko_watchtower

    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    command: >
      --cleanup
      --interval 60
      --label-enable

    environment:
      WATCHTOWER_POLL_INTERVAL: 60

    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  postgres_data:
  caddy_data:
  caddy_config: