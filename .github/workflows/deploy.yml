name: Deploy Containers

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/profomedia/orkobit-frontend
  BACKEND_IMAGE: ghcr.io/profomedia/orkobit-backend

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3

        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # Backend
      # =========================

      - name: Build backend image
        run: |
          docker build \
            -f infrastructure/docker/backend/Dockerfile.prod \
            -t $BACKEND_IMAGE:latest \
            .

      - name: Push backend image
        run: |
          docker push $BACKEND_IMAGE:latest

      # =========================
      # Frontend
      # =========================

      - name: Build frontend image
        run: |
          docker build \
            -f infrastructure/docker/frontend/Dockerfile.prod \
            -t $FRONTEND_IMAGE:latest \
            .

      - name: Push frontend image
        run: |
          docker push $FRONTEND_IMAGE:latest