name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build \
            -f infrastructure/docker/backend/Dockerfile.prod \
            -t app-backend .

      - name: Build Frontend Docker Image
        run: |
          docker build \
            -f infrastructure/docker/frontend/Dockerfile.prod \
            -t app-frontend .