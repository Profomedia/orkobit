name: Backend CI

on:
  push:
    paths:
      - "backend/**"

  pull_request:
    paths:
      - "backend/**"

jobs:
  backend-tests:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:16

        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7

        ports:
          - 6379:6379

    env:
      DB_NAME: test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432

      SECRET_KEY: test-secret-key

      DEBUG: False

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Django Tests
        run: |
          cd backend
          python manage.py test