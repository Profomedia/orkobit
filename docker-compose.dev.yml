services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile.dev

    container_name: orkobit_backend

    working_dir: /app/backend

    volumes:
      - ./backend:/app/backend

    ports:
      - "8029:8000"

    env_file:
      - .env

    depends_on:
      - db
      - redis

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

  # frontend:
  #   build:
  #     context: .
  #     dockerfile: infrastructure/docker/frontend/Dockerfile.dev

  #   container_name: orkobit_frontend

  #   working_dir: /app/frontend

  #   volumes:
  #     - ./frontend:/app/frontend

  #   ports:
  #     - "5129:5173"

  #   env_file:
  #     - .env

  #   command: >
  #     sh -c "
  #     npm run dev -- --host
  #     "

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile.dev

    container_name: orkobit_worker

    working_dir: /app/backend

    volumes:
      - ./backend:/app/backend

    env_file:
      - .env

    depends_on:
      - db
      - redis

    command: >
      celery -A config worker -l info

  db:
    image: postgres:16

    container_name: orkobit_db

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5429:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orkobit_user -d orkobit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer

    container_name: orkobit_adminer

    restart: unless-stopped

    depends_on:
      - db

    ports:
      - "8089:8080"
  redis:
    image: redis:7

    container_name: orkobit_redis

    ports:
      - "6329:6379"

volumes:
  postgres_data: